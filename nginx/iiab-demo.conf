# nginx reverse proxy for IIAB demo server
# Routes *.iiab.io subdomains to systemd-nspawn containers
# Each subdomain gets its own Let's Encrypt certificate

# Upstream definitions for each container
upstream iiab_small {
    server 10.0.3.10:80;
    keepalive 32;
}

upstream iiab_medium {
    server 10.0.3.20:80;
    keepalive 32;
}

upstream iiab_large {
    server 10.0.3.30:80;
    keepalive 32;
}

# HTTP server - serve ACME challenges + redirect rest to HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name small.iiab.io medium.iiab.io large.iiab.io;

    # Let's Encrypt ACME challenge (must be served over HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTP catch-all for other *.iiab.io
server {
    listen 80;
    listen [::]:80;
    server_name *.iiab.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    return 302 https://large.iiab.io$request_uri;
}

# HTTPS server for small.iiab.io
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name small.iiab.io;

    ssl_certificate /etc/letsencrypt/live/small.iiab.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/small.iiab.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_stapling on;
    ssl_stapling_verify on;

    location / {
        proxy_pass http://iiab_small;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# HTTPS server for medium.iiab.io
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name medium.iiab.io;

    ssl_certificate /etc/letsencrypt/live/medium.iiab.io/fullchain.pem;
