# HTTPS server for large.iiab.io
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name large.iiab.io;

    ssl_certificate /etc/letsencrypt/live/large.iiab.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/large.iiab.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_stapling on;
    ssl_stapling_verify on;

    location / {
        proxy_pass http://iiab_large;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Catch-all for any other *.iiab.io subdomains - redirect to large
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name *.iiab.io;

    # Self-signed cert for unknown subdomains (nginx needs _some_ cert)
    ssl_certificate /etc/letsencrypt/live/large.iiab.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/large.iiab.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 302 https://large.iiab.io$request_uri;
}
