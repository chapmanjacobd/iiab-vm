---
# 05-deploy-containers.yml - Deploy and start all IIAB containers
- name: Deploy IIAB Containers
  hosts: host
  become: true
  vars_files:
    - ../vars/containers.yml

  tasks:
    - name: Display deployment mode
      ansible.builtin.debug:
        msg: >
          Deploying containers — volatile: {{ volatile }}, ram_image: {{ ram_image }}

    - name: Validate volatile setting
      ansible.builtin.assert:
        that: volatile in ['no', 'yes', 'state']
        fail_msg: "volatile must be 'no', 'yes', or 'state' (got: {{ volatile }})"

    - name: Load images into RAM if needed
      ansible.builtin.command:
        cmd: "{{ playbook_dir }}/../scripts/ramfs-setup.sh load {{ item.edition }}"
      loop: "{{ containers.values() | list }}"
      loop_control:
        label: "{{ item.edition }}"
      when: >
        item.ram_image | default(ram_image) | bool
      changed_when: true
      register: ramfs_load

    - name: Display RAMFS load results
      ansible.builtin.debug:
        var: ramfs_load
        verbosity: 1

    - name: Verify container images exist
      ansible.builtin.stat:
        path: >-
          {{ '/run/iiab-ramfs/iiab-' + item.edition + '.raw' if (item.ram_image | default(ram_image) | bool) else '/var/lib/machines/iiab-' + item.edition + '.raw' }}
      register: image_stats
      loop: "{{ containers.values() | list }}"
      loop_control:
        label: "{{ item.edition }}"

    - name: Check for missing images
      ansible.builtin.fail:
        msg: >
          Missing image for {{ item.item.edition }}.
          {% if (item.item.ram_image | default(ram_image) | bool) %}
          Run: ./ramfs-setup.sh load {{ item.item.edition }}
          {% else %}
          Run: make build-{{ item.item.edition }}
          {% endif %}
      when: not item.stat.exists
      loop: "{{ image_stats.results }}"

    - name: Create container service files
      ansible.builtin.command:
        cmd: >
          {{ playbook_dir }}/../scripts/container-service.sh
          {{ item.edition }}
          {{ item.ip }}
          --volatile={{ item.volatile | default(volatile) }}
          {% if (item.ram_image | default(ram_image) | bool) %}--ram-image{% endif %}
      loop: "{{ containers.values() | list }}"
      loop_control:
        label: "{{ item.edition }}"
      changed_when: true
      register: service_results

    - name: Display service setup info
      ansible.builtin.debug:
        var: service_results
        verbosity: 1

    - name: Stop existing containers (if running)
      ansible.builtin.command:
        cmd: "machinectl terminate iiab-{{ item.edition }}"
      loop: "{{ containers.values() | list }}"
      loop_control:
        label: "{{ item.edition }}"
      changed_when: true
      failed_when: false

    - name: Remove old machine registrations
      ansible.builtin.command:
        cmd: "machinectl remove iiab-{{ item.edition }}"
      loop: "{{ containers.values() | list }}"
      loop_control:
        label: "{{ item.edition }}"
      changed_when: true
      failed_when: false

    - name: Determine image path for import
      ansible.builtin.set_fact:
        image_paths: >-
          {{ image_paths | default({}) | combine({ item.edition:
            '/run/iiab-ramfs/iiab-' + item.edition + '.raw'
            if (item.ram_image | default(ram_image) | bool)
            else '/var/lib/machines/iiab-' + item.edition + '.raw'
          }) }}
      loop: "{{ containers.values() | list }}"
      loop_control:
        label: "{{ item.edition }}"

    - name: Import all container images
      ansible.builtin.command:
        cmd: "machinectl import-raw {{ image_paths[item.edition] }} iiab-{{ item.edition }}"
      loop: "{{ containers.values() | list }}"
      loop_control:
        label: "{{ item.edition }}"
      register: import_results
      changed_when: "'exists' not in import_results.stderr | default('')"
      failed_when: false

    - name: Start all containers
      ansible.builtin.command:
        cmd: "machinectl start iiab-{{ item.edition }}"
      loop: "{{ containers.values() | list }}"
      loop_control:
        label: "{{ item.edition }}"
      register: start_results
      changed_when: true
      failed_when: false

    - name: Wait for containers to boot
      ansible.builtin.wait_for:
        timeout: 30
      delegate_to: localhost

    - name: Check container status
      ansible.builtin.command:
        cmd: "machinectl status iiab-{{ item.edition }}"
      loop: "{{ containers.values() | list }}"
      loop_control:
        label: "{{ item.edition }}"
      register: status_results
      changed_when: false
      failed_when: false

    - name: Display container status
      ansible.builtin.debug:
        msg: |
          {{ "=== " + item.item.edition | upper + " ===" }}
          {{ item.stdout | default(item.stderr | default('No output')) }}
      loop: "{{ status_results.results }}"
      loop_control:
        label: "{{ item.item.edition }}"

    - name: Verify nginx is running
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: true

    - name: Test HTTP routing
      ansible.builtin.uri:
        url: "http://127.0.0.1/"
        headers:
          Host: "{{ item.edition }}.iiab.io"
        status_code: [200, 301, 302]
        follow_redirects: none
      loop: "{{ containers.values() | list }}"
      loop_control:
        label: "{{ item.edition }}"
      register: http_tests
      failed_when: false
      changed_when: false

    - name: Display routing test results
      ansible.builtin.debug:
        msg: |
          {{ item.item.edition }}.iiab.io -> HTTP {{ item.status | default('failed') }}
      loop: "{{ http_tests.results }}"
      loop_control:
        label: "{{ item.item.edition }}"

    - name: List all machines
      ansible.builtin.command:
        cmd: machinectl list
      changed_when: false
      register: machinectl_list

    - name: Display running machines
      ansible.builtin.debug:
        var: machinectl_list.stdout
