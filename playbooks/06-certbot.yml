---
# 06-certbot.yml - Obtain and renew Let's Encrypt certificates for each subdomain
- name: Setup Let's Encrypt Certificates
  hosts: host
  become: true

  vars:
    domains:
      - small.iiab.io
      - medium.iiab.io
      - large.iiab.io
    admin_email: admin@iiab.io

  tasks:
    - name: Create certbot webroot directory
      ansible.builtin.file:
        path: /var/www/certbot
        state: directory
        mode: "0755"

    - name: Create nginx log directory
      ansible.builtin.file:
        path: /var/log/nginx
        state: directory
        mode: "0755"

    - name: Deploy initial nginx config (HTTP only, for ACME challenges)
      ansible.builtin.copy:
        src: ../nginx/iiab-demo.conf
        dest: /etc/nginx/sites-available/iiab-demo.conf
        mode: "0644"

    - name: Enable nginx site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/iiab-demo.conf
        dest: /etc/nginx/sites-enabled/iiab-demo.conf
        state: link

    - name: Remove default nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Test nginx configuration
      ansible.builtin.command:
        cmd: nginx -t
      changed_when: false

    - name: Reload nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded

    - name: Obtain certificates (only if not already present)
      ansible.builtin.command: >
        certbot certonly
        --webroot
        --webroot-path /var/www/certbot
        --email {{ admin_email }}
        --agree-tos
        --no-eff-email
        --non-interactive
        -d {{ item }}
      args:
        creates: /etc/letsencrypt/live/{{ item }}/fullchain.pem
      loop: "{{ domains }}"
      register: certbot_results

    - name: Display certificate results
      ansible.builtin.debug:
        msg: "{{ item.item }}: {{ 'obtained' if item.changed else 'already exists' }}"
      loop: "{{ certbot_results.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Setup certbot renewal timer
      ansible.builtin.systemd:
        name: certbot.timer
        enabled: true
        state: started

    - name: Create certbot renewal hook to reload nginx
      ansible.builtin.copy:
        content: |
          #!/bin/sh
          nginx -t && systemctl reload nginx
        dest: /etc/letsencrypt/renewal-hooks/post/reload-nginx.sh
        mode: "0755"

    - name: Deploy full nginx config (with SSL)
      ansible.builtin.copy:
        src: ../nginx/iiab-demo.conf
        dest: /etc/nginx/sites-available/iiab-demo.conf
        mode: "0644"
      notify: Reload nginx

    - name: Test final nginx configuration
      ansible.builtin.command:
        cmd: nginx -t
      changed_when: false

  handlers:
    - name: Reload nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
